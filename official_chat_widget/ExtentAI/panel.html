<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Google Sans Flex',Google Sans, Helvetica Neue, sans-serif;
        }
        table {
            border-spacing: 0px;
            border-collapse: collapse;
            border-color:#d1d1d1;
        }
        table th {
            padding:5px;
            background-color:#a0d3fe;
        }
            table td {
                padding: 5px;
            }

        .bubble-chat {
            position: fixed;
            bottom: 60px; /* Cách đáy 20px */
            right: 0px; /* Cách phải 20px */
            z-index: 1000;
            transition: transform 0.3s ease;
            border-radius: 999px 0 0 999px;
            width: 50px;
            height: 44px;
            background: #fff;
            margin-bottom: auto;
            margin-top: auto;
            box-shadow: 0 0 1px 0 var(--sds-color-grey-line2-hover), 0 6px 24px #0c0d190f, 0 12px 48px #0c0d190f, 0 24px 96px #0c0d190f;
            padding: 8px 10px;
            border: solid 1px #e3e3e3;
            cursor: pointer;
        }

            .bubble-chat img {
                width: 25px;
                height: auto;
                /* Loại bỏ shadow mặc định của trình duyệt nếu có */
                /*            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2)); 
*/
            }

            /* Hiệu ứng phóng to khi di chuột vào */
            .bubble-chat:hover {
                transform: scale(1.1);
            }
        /* Khung chat */
        .chat-window {
            margin-left: 0px;
            margin-right: 0px;
            margin-top: 5px;
            /*            width: 94%;
*/ height: calc(100vh - 5px);
            background-color: white;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            z-index: 1001;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* Tiêu đề khung chat */
        .chat-header {
            color: #000;
            padding: 10px;
            align-items: center;
        }

            .chat-header .btclosechat {
                background: none;
                border: none;
                color: #000;
                font-size: 20px;
                cursor: pointer;
                float: right;
            }

        /* Thân khung chat */
        .chat-body {
            flex: 1;
            padding: 10px;
            background-color: #f9f9f9;
            font-size: 14px;
            min-height: 0;
            overflow-y: auto;
            font-family: 'Google Sans Flex',Google Sans, Helvetica Neue, sans-serif;
        }

        /* Chân khung chat */
        .chat-footer {
            position: sticky;
            bottom: 0;
/*            display: flex;
*/            padding: 10px;
            border-top: 0px solid #ddd;
        }

            .chat-footer input {
                flex: 1;
                border-radius: 10px;
                border: 1px solid #ddd !important;
                outline: none;
                padding: 12px 16px;
                font-size: 15px;
                width: 100%;
                height: 80px;
            }

                .chat-footer input::placeholder {
                    font-family: 'Segoe UI', Arial, sans-serif;
                    font-size: 14px;
                    font-style: italic;
                    color: #9aa0a6; /* màu placeholder */
                }

        .pagecontentsize {
            flex: 1;
            /*            max-width:calc(100% - 300px);
*/ min-width: 0;
            border-right: solid 1px #d1d1d1;
        }

        .chatcontentsize {
            position: relative;
            width: 300px;
            min-width: 260px;
            max-width: 600px;
            background: #e6e6e6;
            display: flex !important;
            height: calc(100vh - 129px);
        }

        .pagecontentsize-show {
            width: 100%;
            border-right: solid 0px #d1d1d1;
        }

        .chatcontentsize-hide {
            width: 0px !important;
            display: none;
        }

        .chat-input {
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 🔥 CHỐT */

            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 10px 12px 8px;
            background: #fff;
            box-sizing: border-box;
            width: 100%;
        }

        .chat-textarea {
            width: 100%;
            border: none;
            outline: none;
            /* 🔥 KEY */
            padding: 0;
            margin: 0;
            line-height: 1.4;
            font-size: 15px;
            /*          font-family: 'Segoe UI', Arial, sans-serif;
*/ min-height: 40px;
            max-height: 120px; /* 🔥 GIỚI HẠN ~ 5 DÒNG */
            overflow-y: auto;
            color: #111;
        }

            .chat-textarea::placeholder {
                color: #b0b0b0;
                font-size: 15px;
            }

        .chat-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .chip {
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid #e5e7eb;
            background: #f9fafb;
            font-size: 12px;
            cursor: pointer;
        }

        .icon-btn {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }

        .chat-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* LEFT */
        .left-tools {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon-btn.plus {
            border: none;
            background: none;
            font-size: 20px;
            cursor: pointer;
            color: #374151;
        }

        /* TOOLS BUTTON */
        .tools-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid #e5e7eb;
            background: #fff;
            font-size: 13px;
            color: #374151;
            cursor: pointer;
        }

            .tools-btn:hover {
                background: #f9fafb;
            }

        /* ICON SLIDER */
        .tools-icon {
            display: inline-flex;
            flex-direction: column;
            gap: 3px;
        }

            .tools-icon span {
                display: block;
                width: 14px;
                height: 2px;
                background: #374151;
                position: relative;
            }

                .tools-icon span:nth-child(1)::after {
                    content: '';
                    position: absolute;
                    right: 2px;
                    top: -3px;
                    width: 6px;
                    height: 6px;
                    border-radius: 50%;
                    border: 1.5px solid #374151;
                    background: #fff;
                }

                .tools-icon span:nth-child(2)::after {
                    content: '';
                    position: absolute;
                    left: 3px;
                    top: -3px;
                    width: 6px;
                    height: 6px;
                    border-radius: 50%;
                    border: 1.5px solid #374151;
                    background: #fff;
                }

                .tools-icon span:nth-child(3)::after {
                    content: '';
                    position: absolute;
                    right: 4px;
                    top: -3px;
                    width: 6px;
                    height: 6px;
                    border-radius: 50%;
                    border: 1.5px solid #374151;
                    background: #fff;
                }

        /* RIGHT */
        .right-tools {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .speed {
            font-size: 13px;
            color: #374151;
            cursor: pointer;
        }

        .mic-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid #e5e7eb;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

            .mic-btn:hover {
                background: #f9fafb;
            }

        .mic-icon {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: #374151;
            stroke-width: 1.6;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .mic-btn.active {
            background: #eef2ff;
            border-color: #6366f1;
        }

            .mic-btn.active .mic-icon {
                stroke: #6366f1;
            }

        .intro-card {
            /*            display: flex;
            gap: 12px;
            align-items: center;
*/
            padding: 14px;
            margin-bottom: 12px;
            /*            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;

            box-shadow: 0 4px 14px rgba(0,0,0,.06);

            transition: opacity .25s ease, height .25s ease, margin .25s ease;*/
        }

            .intro-card.hidden {
                opacity: 0;
                height: 0;
                margin: 0;
                padding: 0;
                overflow: hidden;
            }

        .intro-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #eef2ff;
            color: #4f46e5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .intro-title {
            font-weight: 600;
            font-size: 20px;
            margin-bottom: 2px;
        }

        .intro-desc {
            font-size: 16px;
            color: #555;
        }

        .chat-textarea:disabled {
            background: #f9fafb;
            cursor: not-allowed;
        }

        .mic-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .msg.ai {
            margin-bottom: 12px;
        }

        .ai-card {
            background: #f9fafb;
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 14px;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
            /*  font-family: 'Segoe UI', Arial, sans-serif;
*/
        }

        /* time */
        .ai-time {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        /* section */
        .ai-section {
            display: grid;
            grid-template-columns: 22px 1fr; /* icon | content */
            column-gap: 8px;
            row-gap: 2px;
            align-items: start;
            margin-bottom: 12px;
        }

        .ai-icon {
            font-size: 16px;
            line-height: 1;
            margin-top: 2px; /* 🔥 canh chuẩn với title */
        }


        .ai-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .ai-content {
            font-size: 14px;
            color: #111;
            line-height: 1.55;
        }

        /* suggestion */
        .ai-suggest {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .ai-suggest-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }

        .suggest-chip {
            background: #e0f2fe;
            color: #0369a1;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
            border: none;
        }

            .suggest-chip:hover {
                background: #bae6fd;
            }

        .ai-analysis .ai-content {
            max-height: 3.2em;
            overflow: hidden;
        }

        .msg {
            margin-bottom: 10px;
            font-family: 'Google Sans Flex',Google Sans, Helvetica Neue, sans-serif;
        }

            /* ===== BOT ===== */
            .msg .bot {
                background: #ffffff;
                /*                border-radius: 12px;
                        padding: 14px 16px;
        */
                max-width: 100%;
                font-size: 13px;
                line-height: 1.2;
                box-shadow: 0 1px 2px rgba(0,0,0,.06);
            }

            /* ===== USER ===== */
            .msg .user {
                padding-block: calc(.25rem * 1.5);
                padding-inline: calc(.25rem * 4);
                margin-left: auto;
                background: #e9e9e980;
                color: #000;
                border-radius: 18px;
                max-width: 95%;
                width: fit-content;
                font-size: 13px;
                line-height: 1.2;
            }

        /* ===== QUICK BUTTON (CHIP STYLE) ===== */
        .quick-btn {
            display: inline-block;
            padding: 6px 14px;
            margin: 6px 6px 0 0;
            font-size: 13px;
            border-radius: 10px;
            background: #efefef;
            color: #111;
            cursor: pointer;
            transition: background .15s;
        }

            .quick-btn:hover {
                background: #dcdcdc;
            }

        /* ===== QUICK BUTTON (CHIP STYLE) ===== */
        .tool-btn {
            display: inline-block;
            padding: 6px 14px;
            margin: 6px 6px 0 0;
            font-size: 13px;
            border-radius: 999px;
            background: #86d1ff;
            color: #111;
            cursor: pointer;
            transition: background .15s;
        }

            .tool-btn:hover {
                background: #e5e5e5;
            }

        .tool-btn_active {
            background: #7000f6 !important;
            color: #fff;
        }
        /* THANH KÉO */
        .resizer {
            width: 6px;
            cursor: col-resize;
            background: transparent;
            height: calc(100vh - 129px);
        }

            .resizer:hover {
                background: rgba(0,0,0,0.08);
            }

        .msg.bot.thinking {
            display: flex;
            gap: 6px;
            align-items: center;
            font-style: italic;
            color: #6b7280;
            font-size: 13px;
            margin: 6px 0 10px 0;
        }

        .thinking-icon {
            font-size: 16px;
        }

        .thinking-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-toolbar-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .toolbar-left,
        .toolbar-right {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            .icon-btn:hover {
                background: #f3f4f6;
            }

            .icon-btn.primary {
                background: #ede9fe;
                color: #7c3aed;
            }

        .icon-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280; /* gray-500 */
        }

            .icon-btn:hover {
                background: #f3f4f6;
                color: #111827;
            }

            .icon-btn.new-chat {
                border: 1px solid #e5e7eb;
            }

        .tool-wrapper {
            position: relative;
        }

        .tool-select-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 28px;
            padding: 0 8px;
            border-radius: 999px;
            border: 1px solid #e5e7eb;
            background: #fff;
            cursor: pointer;
        }

        .tool-icon {
            display: flex;
            color: #7c3aed;
        }

        .tool-caret {
            color: #6b7280;
        }

        .tool-select-btn:hover {
            background: #f5f3ff;
        }

        /* ===== DROPDOWN ===== */
        .tool-dropdown {
            position: absolute; /* 🔑 QUAN TRỌNG */
            bottom: calc(100% + 8px);
            left: 0;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            box-shadow: 0 10px 24px rgba(0,0,0,.12);
            min-width: 200px;
            padding: 6px;
            z-index: 9999; /* 🔑 nổi lên trên */
        }

            .tool-dropdown.hidden {
                display: none;
            }
        /* ===== MENU ITEM (ĐẸP HƠN) ===== */
        .tool-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            color: #111827;
        }

        .tool-item-icon {
            width: 18px;
            text-align: center;
            opacity: .7;
        }

        .tool-item:hover {
            background: #f3f4f6;
        }

        .tool-item.active {
            background: #ede9fe;
            color: #6d28d9;
            font-weight: 600;
        }

            .tool-item.active .tool-item-icon {
                opacity: 1;
            }
        .hidden {
            display: none;
        }

        .auth-view {
            padding: 20px;
            margin-right: 20px;
        }

            .auth-view input {
                width: 100%;
                margin-bottom: 10px;
                padding: 8px;
            }

        .error {
            color: red;
            font-size: 13px;
        }
        .chat-header {
            display: flex;
            justify-content: end;
            align-items: end;
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .brand-icon {
            width: 18px;
            height: 18px;
        }

        .user-box {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-name {
            font-size: 13px;
            max-width: 100px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-menu {
            position: absolute;
            right: 0;
            top: 32px;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            box-shadow: 0 10px 24px rgba(0,0,0,.12);
            min-width: 140px;
            z-index: 20;
        }

            .user-menu.hidden {
                display: none;
            }

        .user-menu-item {
            padding: 8px 10px;
            font-size: 13px;
            cursor: pointer;
        }

            .user-menu-item:hover {
                background: #f3f4f6;
            }

            .user-menu-item.danger {
                color: #dc2626;
            }
        .icon-anser
        {
            height:18px;
        }
        .thinking-dots {
            display: inline-block;
            font-size: 14px;
            color: #64748b;
            animation: thinkingBlink 1.4s infinite;
        }

        @keyframes thinkingBlink {
            0% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.3;
            }
        }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div id="loginView" class="auth-view hidden">
        <h3>AI Internal Login</h3>

        <input id="username" placeholder="Username" />
        <input id="password" type="password" placeholder="Password" />

        <button id="btnLogin">Login</button>

        <div id="loginError" class="error"></div>
    </div>
    <div id="chatWindow" class="chat-window">
        <div class="chat-header">
            <div class="user-box" id="userBox">
                <img id="userAvatar" class="user-avatar" />
                <span id="userName" class="user-name"></span>
                <div class="log_out" id="btnLogout">
                    <img id="logout" src="logout.png" class="logout-img"/>
                </div>
            </div>
        </div>
        <div class="chat-body" id="chatBody">
            <div id="chatIntro" class="intro-card">
                <div class="intro-content">
                    <div class="intro-title" id="introTitle">
                        Trợ lý AI
                    </div>
                    <div class="intro-desc" id="introDesc">
                        Tôi có thể giúp bạn trả lời câu hỏi và xử lý công việc.
                    </div>
                </div>
            </div>
            <div id="chatBox"></div>
        </div>
        <div class="chat-footer">
            <!-- Toolbar trên -->
            <div class="chat-toolbar-top">
                <div class="toolbar-left">
                    <div class="tool-wrapper">
                        <div class="tool-select-btn" id="toolBtn" title="Select tool">
                            <!-- Icon tool -->
                            <span class="tool-icon" id="toolIcon">
                                <svg viewBox="0 0 24 24" width="16" height="16">
                                    <path d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zM8 11c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zM8 13c-2.33 0-7 1.17-7 3.5V19h14v-2.5C15 14.17 10.33 13 8 13zM16 13c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"
                                          fill="currentColor" />
                                </svg>

                            </span>

                            <!-- Caret -->
                            <span class="tool-caret">
                                <svg viewBox="0 0 24 24" width="12" height="12">
                                    <path d="M6 9l6 6 6-6"
                                          fill="none"
                                          stroke="currentColor"
                                          stroke-width="2"
                                          stroke-linecap="round"
                                          stroke-linejoin="round" />
                                </svg>
                            </span>
                        </div>
                        <div class="tool-dropdown hidden" id="toolDropdown">
                            <div class="tool-item active" data-tool="HRAssistant">
                                HR Assistant
                            </div>
                            <div class="tool-item" data-tool="WarehouseAssistant">
                                Warehouse Assistent
                            </div>
                            <div class="tool-item" data-tool="NDTAssistant">
                                NDT Assistant
                            </div>
                            <div class="tool-item" data-tool="QHSEAssistant">
                                QHSE Assistant
                            </div>
                            <div class="tool-item" data-tool="TrainingAssistant">
                                Training Assistant
                            </div>
                        </div>
                    </div>
                    <div class="icon-btn" title="Attach">🔗</div>
                </div>

                <div class="toolbar-right">
                    <div class="icon-btn" title="History">🕘</div>
                    <div class="icon-btn new-chat" title="New chat">
                        <svg viewBox="0 0 24 24" width="16" height="16">
                            <path d="M12 5v14M5 12h14"
                                  stroke="currentColor"
                                  stroke-width="1.8"
                                  stroke-linecap="round" />
                        </svg>
                    </div>
                </div>
            </div>
            <div class="chat-input">
                <textarea id="txtMsg" class="chat-textarea" multiple placeholder="Ask anything" autocomplete="off"></textarea>

                <div class="chat-toolbar">
                    <div class="left-tools">
                        <!--<div onclick="calltool()" class="tools-btn">
                            <span class="tools-icon">
                                <span></span><span></span><span></span>
                            </span>
                            <span class="tools-text">Tools</span>
                        </div>-->
                    </div>

                    <div class="right-tools">
                        <div id="micBtn" class="mic-btn" title="Voice input">
                            <svg viewBox="0 0 24 24" class="mic-icon">
                                <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3z" />
