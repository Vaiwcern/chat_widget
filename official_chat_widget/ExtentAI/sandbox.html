<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: white;
    }
  </style>
</head>

<body>
  <script>
    window.addEventListener('message', function (e) {
      if (typeof e.data !== 'string' || e.data.length === 0) return;
      // Use a data URI iframe inside the sandbox.
      // This accomplishes two things:
      // 1. Inherits the sandbox CSP (allowing unsafe-inline and https://cdn.plot.ly).
      // 2. Sets location.href to 'data:...' instead of 'chrome-extension://...', preventing Plotly's clip-path logic from triggering a cross-origin error.
      var iframe = document.createElement('iframe');
      iframe.style.cssText = 'width:100%;height:100%;border:0;';
      iframe.sandbox = 'allow-scripts';
      iframe.src = 'data:text/html;charset=utf-8,' + encodeURIComponent(e.data);
      document.body.innerHTML = '';
      document.body.appendChild(iframe);
    });
  </script>
</body>

</html>
